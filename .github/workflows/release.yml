name: Release

# Build, sign, and publish desktop bundles + the updater manifest (latest.json)
# to a GitHub Release. Triggered by pushing a version tag, e.g. `git tag v0.1.1`.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # universal: Intel + Apple Silicon
            args: "--target universal-apple-darwin --config src-tauri/tauri.bundle-ffmpeg.conf.json"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: "--config src-tauri/tauri.bundle-ffmpeg.conf.json"
            rust-targets: ""
          - platform: windows-latest
            args: "--config src-tauri/tauri.bundle-ffmpeg.conf.json"
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm --prefix app ci

      # Bundle a current ffmpeg as a Tauri externalBin (see tauri.bundle-ffmpeg
      # .conf.json). ffmpeg-sidecar's runtime download is unpinned and can serve
      # a build too old to decode iOS-18 adaptive-HDR HEICs; shipping a known-
      # current binary in the signed installer fixes that deterministically. The
      # externalBin file MUST be named `ffmpeg-<target-triple>` (Tauri strips the
      # suffix and signs it into the bundle). Tauri does not lipo sidecars, so
      # the macOS universal build needs a hand-lipo'd fat binary.
      - name: Bundle ffmpeg (macOS universal)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/src-tauri/binaries
          curl -fL -o ff_arm.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
          curl -fL -o ff_x86.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/release/ffmpeg.zip"
          unzip -o ff_arm.zip -d ff_arm
          unzip -o ff_x86.zip -d ff_x86
          arm=$(find ff_arm -name ffmpeg -type f | head -1)
          x86=$(find ff_x86 -name ffmpeg -type f | head -1)
          # Provide a lipo'd universal binary (the name for a
          # `--target universal-apple-darwin` build) AND the two per-arch names,
          # so the build resolves the externalBin regardless of which naming
          # Tauri expects for a universal bundle. Unreferenced names are ignored.
          lipo -create "$arm" "$x86" \
            -output app/src-tauri/binaries/ffmpeg-universal-apple-darwin
          cp "$arm" app/src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          cp "$x86" app/src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          chmod +x app/src-tauri/binaries/ffmpeg-*-apple-darwin
          app/src-tauri/binaries/ffmpeg-universal-apple-darwin -version | head -1

      - name: Bundle ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/src-tauri/binaries
          curl -fL -o ff.zip "https://ffmpeg.martin-riedl.de/redirect/latest/linux/amd64/release/ffmpeg.zip"
          unzip -o ff.zip -d ff
          bin=$(find ff -name ffmpeg -type f | head -1)
          cp "$bin" app/src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          chmod +x app/src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          app/src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu -version | head -1

      # Martin-Riedl has no Windows build; use BtbN's pinned n7.1 GPL release
      # (immutable GitHub asset, includes the HEVC decoder + HEIF demuxer). The
      # zip nests the exe under `<folder>/bin/`, so locate it with find.
      - name: Bundle ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/src-tauri/binaries
          curl -fL -o ff.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-7.1.zip"
          unzip -o ff.zip -d ff
          exe=$(find ff -name ffmpeg.exe | head -1)
          cp "$exe" app/src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          app/src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe -version | head -1

      # The committed entitlements.plist ships a __TEAM_ID__ placeholder so no
      # team-specific value lives in git. Substitute the real 10-char Team ID
      # (from the same secret used for notarization) before Tauri signs the
      # .app with these entitlements. macOS-only: the entitlements are ignored
      # on other platforms.
      - name: Inject Apple Team ID into entitlements
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          sed -i '' "s/__TEAM_ID__/${{ secrets.APPLE_TEAM_ID }}/g" \
            app/src-tauri/entitlements.plist
          echo "Entitlements after substitution:"
          cat app/src-tauri/entitlements.plist

      # The entitlements above (keychain-access-groups + application-identifier)
      # are RESTRICTED on macOS — the OS ignores them (keychain calls return
      # errSecMissingEntitlement, -34018) unless an embedded Developer ID
      # provisioning profile allow-lists them. tauri.conf.json's
      # bundle.macOS.files maps this file into Contents/embedded.provisionprofile,
      # and the bundler copies it in BEFORE it signs the .app, so the profile is
      # sealed inside the signature. The profile is generated on the Apple
      # portal from an explicit App ID (org.stingle.desktop) with Keychain
      # Sharing; store it base64-encoded as the APPLE_PROVISIONING_PROFILE_BASE64
      # secret. It is NOT secret, but we materialize it here (rather than commit
      # it) so a single secret drives rotation when it expires (~1 yr).
      - name: Materialize provisioning profile
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${PROFILE_B64:-}" ]]; then
            echo "::error::APPLE_PROVISIONING_PROFILE_BASE64 secret is missing. The"
            echo "::error::macOS data-protection keychain (Touch ID auto-unlock) needs a"
            echo "::error::Developer ID provisioning profile embedded in the bundle. Create"
            echo "::error::an explicit App ID (org.stingle.desktop) with Keychain Sharing,"
            echo "::error::make a Developer ID profile, and store it as this base64 secret."
            exit 1
          fi
          echo "$PROFILE_B64" | base64 --decode > app/src-tauri/embedded.provisionprofile
          # A valid profile is a CMS-signed plist — a few KB. An empty/garbage
          # secret would silently break signing, so fail loudly here instead.
          size=$(wc -c < app/src-tauri/embedded.provisionprofile)
          echo "Decoded provisioning profile: ${size} bytes"
          if [[ "$size" -lt 500 ]]; then
            echo "::error::Decoded provisioning profile is implausibly small (${size} bytes) — bad secret?"
            exit 1
          fi

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — see app/src-tauri/stingle-updater.key.pub. The
          # private key is the corresponding *.key file, stored as a repo secret.
          # No passphrase was set, so the PASSWORD secret may be empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID code signing + notarization (only used on macOS runner).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}                   # base64 of the Developer ID Application .p12
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }} # password set when exporting the .p12
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}         # "Developer ID Application: Name (TEAMID)"
          APPLE_ID: ${{ secrets.APPLE_ID }}                                     # your Apple ID email
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}                         # app-specific password for notarization
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}                           # 10-char team ID
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "Stingle Desktop ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          # tauri-action generates latest.json and uploads it alongside the
          # signed bundles, so the configured endpoint resolves once published.
          args: ${{ matrix.args }}

      # Signing/notarization can silently degrade (missing secret → ad-hoc
      # signature, un-notarized bundle, broken sidecar signature) and still
      # produce a "successful" build that ships an app macOS SIGKILLs at launch
      # with "Code Signature Invalid" — especially after the updater swaps the
      # bundle in place. The release above is a DRAFT, so failing here gives us
      # a red check and a chance to fix things before anyone hits Publish.
      #
      # We validate BOTH the built .app AND a fresh extraction of the
      # `.app.tar.gz` updater artifact — the tarball is what users actually
      # receive over the updater, so re-extracting and re-verifying it mirrors
      # exactly what happens on their disk.
      - name: Verify macOS signature & notarization
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir="target/universal-apple-darwin/release/bundle"
          app=$(find "$bundle_dir/macos" -maxdepth 1 -name '*.app' -type d | head -1)
          tgz=$(find "$bundle_dir/macos" -maxdepth 1 -name '*.app.tar.gz' -type f | head -1)
          if [[ -z "$app" || -z "$tgz" ]]; then
            echo "::error::Could not locate the built .app / .app.tar.gz under $bundle_dir"
            exit 1
          fi

          # Reusable assertion: a bundle must be Developer-ID signed (not ad-hoc),
          # pass strict deep verification (covers the nested ffmpeg sidecar), and
          # be accepted by Gatekeeper as a notarized Developer ID app.
          verify() {
            local target="$1" label="$2"
            echo "==== Verifying $label: $target ===="

            # Fail on ad-hoc / linker signatures — the exact state that boots on
            # first install but dies "Code Signature Invalid" after an update.
            local authority
            authority=$(codesign -dvv "$target" 2>&1 || true)
            echo "$authority"
            if ! grep -q "Authority=Developer ID Application" <<<"$authority"; then
              echo "::error::$label is not signed with a Developer ID Application certificate"
              return 1
            fi

            # --deep --strict walks nested code (Contents/MacOS/ffmpeg) too.
            codesign --verify --deep --strict --verbose=2 "$target"

            # Gatekeeper assessment: must be accepted as a notarized Developer ID app.
            spctl --assess --type execute --verbose=4 "$target"

            # The Developer ID provisioning profile must be embedded, else the
            # restricted keychain entitlements are inert at runtime (-34018) and
            # macOS auto-unlock silently drops to the ungated login keychain.
            if [[ ! -f "$target/Contents/embedded.provisionprofile" ]]; then
              echo "::error::$label is missing Contents/embedded.provisionprofile — Touch ID auto-unlock will not work"
              return 1
            fi

            # The restricted entitlements must actually be sealed into the
            # signature (a profile with no matching entitlement claim is useless).
            local ents
            ents=$(codesign -d --entitlements - --xml "$target" 2>/dev/null | plutil -convert xml1 -o - - 2>/dev/null || true)
            for key in "com.apple.application-identifier" "keychain-access-groups"; do
              if ! grep -q "$key" <<<"$ents"; then
                echo "::error::$label signature is missing the '$key' entitlement"
                return 1
              fi
            done
          }

          # 1) The .app as built/signed/stapled by tauri-action.
          verify "$app" "built .app"
          echo "Stapled ticket:"; xcrun stapler validate "$app"

          # 2) The updater tarball, extracted the way the client updater does.
          workdir=$(mktemp -d)
          tar xzf "$tgz" -C "$workdir"
          extracted=$(find "$workdir" -maxdepth 1 -name '*.app' -type d | head -1)
          verify "$extracted" "extracted .app.tar.gz (updater payload)"
          # Stapled ticket must survive the tar round-trip for offline launches.
          xcrun stapler validate "$extracted"

          echo "macOS signature & notarization checks passed."

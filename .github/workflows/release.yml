name: Release

# Build, sign, and publish desktop bundles + the updater manifest (latest.json)
# to a GitHub Release. Triggered by pushing a version tag, e.g. `git tag v0.1.1`.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # universal: Intel + Apple Silicon
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm --prefix app ci

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — see app/src-tauri/stingle-updater.key.pub. The
          # private key is the corresponding *.key file, stored as a repo secret.
          # No passphrase was set, so the PASSWORD secret may be empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "Stingle Desktop ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          # tauri-action generates latest.json and uploads it alongside the
          # signed bundles, so the configured endpoint resolves once published.
          args: ${{ matrix.args }}
